[tool.ruff]
target-version = "py39"
line-length = 100
extend-exclude = [
    "build",
    "dist",
    "tmp",
]

[tool.ruff.lint]
select = [
    "B",
    "E",
    "F",
    "I",
    "UP",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]

[tool.coverage.run]
branch = true
source = [
    "wagom_player",
]

[tool.coverage.report]
fail_under = 12
show_missing = true
skip_covered = true
exclude_also = [
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "pragma: no cover",
]
