name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Python 3.10
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run local check suite
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            ./scripts/check.ps1 -DiffRange "origin/${{ github.base_ref }}...HEAD"
          } elseif ("${{ github.event.before }}" -match "^0+$") {
            ./scripts/check.ps1 -DiffRange "HEAD"
          } else {
            ./scripts/check.ps1 -DiffRange "${{ github.event.before }}..HEAD"
          }
